<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAWARE — Key Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #9b30ff;
    --cyan: #00e5ff;
    --pink: #ff2d78;
    --green: #00ffb3;
    --bg: #050008;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  canvas#bg {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }
  .n1 { width: 700px; height: 700px; background: radial-gradient(circle, #7b00ff55 0%, transparent 70%); top: -200px; left: -150px; animation: drift1 12s ease-in-out infinite alternate; }
  .n2 { width: 600px; height: 600px; background: radial-gradient(circle, #00cfff44 0%, transparent 70%); bottom: -180px; right: -100px; animation: drift2 15s ease-in-out infinite alternate; }
  .n3 { width: 400px; height: 400px; background: radial-gradient(circle, #ff2d7833 0%, transparent 70%); top: 35%; left: 38%; animation: drift1 18s ease-in-out infinite alternate-reverse; }

  @keyframes drift1 { to { transform: translate(40px, 30px); } }
  @keyframes drift2 { to { transform: translate(-40px, -25px); } }

  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }

  /* ── LOADING ── */
  #loading {
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    animation: fadeIn 0.6s ease;
  }

  #key-screen {
    display: none; flex-direction: column;
    align-items: center; gap: 22px;
    animation: revealUp 0.8s cubic-bezier(.16,1,.3,1);
    padding: 20px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes revealUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(40px, 8vw, 72px);
    font-weight: 900;
    letter-spacing: 16px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--purple), var(--cyan), var(--pink), var(--purple));
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradFlow 4s linear infinite;
    filter: drop-shadow(0 0 30px rgba(155,48,255,0.5));
  }

  @keyframes gradFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .loading-label {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    letter-spacing: 5px;
    color: #c090ff;
    animation: blink 1.3s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .bar-wrap {
    width: min(380px, 80vw);
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    border-radius: 3px;
    box-shadow: 0 0 16px var(--purple);
    transition: width 0.08s linear;
  }

  .spinner-ring {
    width: 52px; height: 52px;
    border: 2px solid rgba(155,48,255,0.15);
    border-top: 2px solid var(--purple);
    border-right: 2px solid var(--cyan);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── KEY SCREEN ── */
  .subtitle {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--cyan);
    opacity: 0.7;
    text-transform: uppercase;
  }

  .key-headline {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 3.5vw, 28px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-align: center;
  }

  .badge {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--pink);
    border: 1px solid rgba(255,45,120,0.4);
    background: rgba(255,45,120,0.08);
    border-radius: 20px;
    padding: 5px 20px;
    text-transform: uppercase;
  }

  .key-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(155,48,255,0.35);
    border-radius: 14px;
    padding: 22px 26px;
    max-width: min(680px, 90vw);
    position: relative;
    overflow: hidden;
  }

  .key-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(155,48,255,0.06), rgba(0,229,255,0.04));
    pointer-events: none;
  }

  .key-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 1.6vw, 12px);
    color: var(--green);
    word-break: break-all;
    line-height: 1.9;
    letter-spacing: 1.5px;
    flex: 1;
    text-shadow: 0 0 10px rgba(0,255,179,0.4);
  }

  .copy-btn {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--purple);
    background: rgba(155,48,255,0.1);
    border: 1px solid rgba(155,48,255,0.45);
    border-radius: 8px;
    padding: 11px 18px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: rgba(155,48,255,0.25);
    box-shadow: 0 0 20px rgba(155,48,255,0.3);
    color: #fff;
  }

  .copy-btn.copied {
    color: var(--green);
    border-color: var(--green);
    background: rgba(0,255,179,0.08);
  }

  .line {
    width: min(220px, 60vw);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
  }

  /* scan line overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 20;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<div id="app">
  <div id="loading">
    <div class="logo">ZAWARE</div>
    <div class="spinner-ring"></div>
    <div class="loading-label">Loading tight!</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  </div>

  <div id="key-screen">
    <div class="logo">ZAWARE</div>
    <div class="line"></div>
    <div class="subtitle">Access Portal</div>
    <div class="key-headline">Here is your key</div>
    <div class="badge">Weekly</div>
    <div class="key-card">
      <div class="key-text">Ek9v38Ktn3SLuMALIxCXmRTE$GDRGDFWE$FSSDGSD5345ff-ZAWARE</div>
      <button class="copy-btn" id="copy-btn" onclick="copyKey()">COPY</button>
    </div>
    <div class="line"></div>
  </div>
</div>

<script>
  // Stars
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 220}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.2,
    speed: Math.random() * 0.00025 + 0.00008,
    alpha: Math.random() * 0.7 + 0.2,
    twinkle: Math.random() * Math.PI * 2
  }));

  let frame = 0;
  (function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > 1) { s.y = 0; s.x = Math.random(); }
      const a = s.alpha * (0.7 + 0.3 * Math.sin(frame * 0.02 + s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    });
  })();

  // Progress bar (5 seconds)
  const bar = document.getElementById('bar');
  const start = Date.now();
  const duration = 5000;
  (function tick() {
    const elapsed = Date.now() - start;
    const pct = Math.min(100, (elapsed / duration) * 100);
    bar.style.width = pct + '%';
    if (pct < 100) {
      requestAnimationFrame(tick);
    } else {
      setTimeout(showKey, 300);
    }
  })();

  function showKey() {
    document.getElementById('loading').style.display = 'none';
    const ks = document.getElementById('key-screen');
    ks.style.display = 'flex';
  }

  function copyKey() {
    const key = 'Ek9v38Ktn3SLuMALIxCXmRTE$GDRGDFWE$FSSDGSD5345ff-ZAWARE';
    navigator.clipboard.writeText(key).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = key; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    });
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'COPIED!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2500);
  }
</script>
</body>
</html>
